<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wine Journal · 我的酒单</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --burgundy: #5C1E2C;
    --burgundy-deep: #3D1019;
    --burgundy-light: #8B3A4A;
    --gold: #C9A84C;
    --gold-light: #E8CC7A;
    --gold-pale: #F5EDD6;
    --cream: #FAF6EF;
    --cream-dark: #F0E8D8;
    --ink: #1C1008;
    --ink-mid: #5C4033;
    --ink-light: #9A7A6A;
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--burgundy-deep);
    padding: 32px 24px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 120%, rgba(201,168,76,0.15) 0%, transparent 70%);
  }
  header .ornament {
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
    margin-bottom: 8px;
  }
  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 300;
    color: var(--cream);
    letter-spacing: 2px;
  }
  header h1 span { color: var(--gold); }
  header .subtitle {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    color: var(--gold-light);
    opacity: 0.8;
    font-size: 14px;
    margin-top: 4px;
    letter-spacing: 1px;
  }
  .header-line {
    width: 60px;
    height: 1px;
    background: var(--gold);
    margin: 16px auto 0;
    opacity: 0.5;
  }

  /* ── NAV / STATS ── */
  .stats-bar {
    background: var(--burgundy);
    display: flex;
    justify-content: center;
    gap: 0;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }
  .stat {
    padding: 10px 24px;
    text-align: center;
    border-right: 1px solid rgba(201,168,76,0.15);
    flex: 1;
    max-width: 140px;
  }
  .stat:last-child { border-right: none; }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--gold);
    display: block;
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: rgba(245,237,214,0.6);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    background: var(--cream-dark);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    border-bottom: 1px solid rgba(92,30,44,0.1);
  }
  .toolbar input[type="text"] {
    flex: 1;
    min-width: 160px;
    padding: 8px 14px;
    border: 1px solid rgba(92,30,44,0.2);
    border-radius: 2px;
    background: var(--white);
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
  }
  .toolbar input[type="text"]:focus {
    border-color: var(--burgundy-light);
  }
  .toolbar select {
    padding: 8px 12px;
    border: 1px solid rgba(92,30,44,0.2);
    border-radius: 2px;
    background: var(--white);
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    cursor: pointer;
  }
  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 2px;
    font-family: 'Crimson Pro', serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--burgundy);
    color: var(--gold-pale);
  }
  .btn-primary:hover { background: var(--burgundy-light); }
  .btn-secondary {
    background: transparent;
    color: var(--burgundy);
    border: 1px solid var(--burgundy);
  }
  .btn-secondary:hover { background: rgba(92,30,44,0.08); }
  .btn-gold {
    background: var(--gold);
    color: var(--burgundy-deep);
    font-weight: 600;
  }
  .btn-gold:hover { background: var(--gold-light); }

  /* ── WINE GRID ── */
  .container { padding: 20px 16px; max-width: 1200px; margin: 0 auto; }

  .wine-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .wine-card {
    background: var(--white);
    border: 1px solid rgba(92,30,44,0.1);
    border-radius: 3px;
    overflow: hidden;
    transition: box-shadow 0.25s, transform 0.25s;
    cursor: pointer;
    animation: fadeUp 0.3s ease both;
  }
  .wine-card:hover {
    box-shadow: 0 8px 32px rgba(92,30,44,0.12);
    transform: translateY(-2px);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-photo {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    background: linear-gradient(135deg, var(--burgundy-deep) 0%, var(--burgundy) 100%);
  }
  .card-photo-placeholder {
    width: 100%;
    height: 160px;
    background: linear-gradient(135deg, var(--burgundy-deep) 0%, var(--burgundy) 60%, var(--burgundy-light) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    color: rgba(201,168,76,0.3);
  }

  .card-body { padding: 14px 16px; }
  .card-liked {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 1px;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .liked-yes { background: rgba(92,30,44,0.08); color: var(--burgundy); }
  .liked-no { background: rgba(0,0,0,0.05); color: var(--ink-light); }
  .liked-ok { background: rgba(201,168,76,0.12); color: var(--ink-mid); }

  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .card-meta {
    font-size: 12px;
    color: var(--ink-light);
    font-style: italic;
    margin-bottom: 8px;
  }
  .card-rating { color: var(--gold); font-size: 13px; margin-bottom: 6px; }
  .card-notes {
    font-size: 13px;
    color: var(--ink-mid);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-footer {
    padding: 8px 16px;
    background: var(--cream);
    border-top: 1px solid rgba(92,30,44,0.06);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-occasion { font-size: 11px; color: var(--ink-light); font-style: italic; }
  .card-actions { display: flex; gap: 6px; }
  .btn-icon {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    font-size: 14px;
    opacity: 0.5;
    transition: opacity 0.2s;
    border-radius: 2px;
  }
  .btn-icon:hover { opacity: 1; background: rgba(92,30,44,0.08); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-light);
    font-style: italic;
    grid-column: 1/-1;
  }
  .empty-state .big { font-size: 48px; display: block; margin-bottom: 12px; opacity: 0.3; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(28,16,8,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--cream);
    width: 100%;
    max-width: 560px;
    max-height: 90vh;
    overflow-y: auto;
    border-radius: 3px;
    box-shadow: 0 24px 80px rgba(28,16,8,0.4);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.97) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header {
    background: var(--burgundy-deep);
    padding: 20px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    color: var(--gold-pale);
    font-weight: 300;
    letter-spacing: 1px;
  }
  .modal-close {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 22px;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
    line-height: 1;
    padding: 4px;
  }
  .modal-close:hover { opacity: 1; }
  .modal-body { padding: 24px; }

  .form-group { margin-bottom: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-light);
    margin-bottom: 5px;
  }
  input[type="text"], input[type="number"], textarea, select.form-select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid rgba(92,30,44,0.2);
    border-radius: 2px;
    background: var(--white);
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, input[type="number"]:focus, textarea:focus, select.form-select:focus {
    border-color: var(--burgundy-light);
  }
  textarea { resize: vertical; min-height: 72px; }

  .rating-input { display: flex; gap: 4px; }
  .star-btn {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #ddd;
    transition: color 0.15s, transform 0.15s;
    padding: 2px;
    line-height: 1;
  }
  .star-btn.active { color: var(--gold); }
  .star-btn:hover { transform: scale(1.2); }

  .photo-upload-area {
    border: 2px dashed rgba(92,30,44,0.2);
    border-radius: 3px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .photo-upload-area:hover {
    border-color: var(--burgundy-light);
    background: rgba(92,30,44,0.03);
  }
  .photo-upload-area input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .photo-preview {
    width: 100%;
    max-height: 180px;
    object-fit: cover;
    border-radius: 2px;
    margin-top: 10px;
    display: none;
  }
  .upload-text { font-size: 13px; color: var(--ink-light); font-style: italic; }
  .upload-icon { font-size: 28px; opacity: 0.3; display: block; margin-bottom: 6px; }

  .modal-footer {
    padding: 16px 24px;
    background: var(--cream-dark);
    border-top: 1px solid rgba(92,30,44,0.08);
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* ── DETAIL VIEW ── */
  .detail-photo {
    width: 100%;
    max-height: 240px;
    object-fit: cover;
    display: block;
  }
  .detail-photo-placeholder {
    width: 100%;
    height: 180px;
    background: linear-gradient(135deg, var(--burgundy-deep), var(--burgundy));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 60px;
    color: rgba(201,168,76,0.2);
  }
  .detail-body { padding: 20px 24px; }
  .detail-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 4px;
    line-height: 1.2;
  }
  .detail-appellation {
    font-style: italic;
    color: var(--ink-light);
    font-size: 14px;
    margin-bottom: 12px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .detail-field label { margin-bottom: 2px; }
  .detail-field .value {
    font-size: 15px;
    color: var(--ink);
  }
  .detail-divider {
    height: 1px;
    background: rgba(92,30,44,0.1);
    margin: 14px 0;
  }
  .detail-notes-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-light);
    margin-bottom: 6px;
  }
  .detail-notes {
    font-size: 15px;
    color: var(--ink-mid);
    line-height: 1.7;
    font-style: italic;
  }

  /* ── IMPORT/EXPORT ── */
  .io-panel {
    background: var(--cream-dark);
    border: 1px solid rgba(92,30,44,0.1);
    border-radius: 3px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: none;
  }
  .io-panel.open { display: block; }
  .io-panel h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    color: var(--burgundy);
    margin-bottom: 12px;
    font-weight: 400;
  }
  .io-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .io-note { font-size: 12px; color: var(--ink-light); font-style: italic; margin-top: 8px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--burgundy-deep);
    color: var(--gold-pale);
    padding: 10px 20px;
    border-radius: 2px;
    font-size: 13px;
    border-left: 3px solid var(--gold);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.3s;
    z-index: 200;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: rgba(92,30,44,0.3); border-radius: 3px; }

  @media (max-width: 500px) {
    .form-row { grid-template-columns: 1fr; }
    .wine-grid { grid-template-columns: 1fr; }
    .stat { padding: 8px 12px; }
    .stat-num { font-size: 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="ornament">✦ Wine Journal ✦</div>
  <h1>我的 <span>酒单</span></h1>
  <p class="subtitle">A personal record of wines tasted</p>
  <div class="header-line"></div>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-label">已记录</span></div>
  <div class="stat"><span class="stat-num" id="statLiked">0</span><span class="stat-label">喜欢 ♥</span></div>
  <div class="stat"><span class="stat-num" id="statCountries">0</span><span class="stat-label">产国</span></div>
</div>

<div class="container">
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍  搜索酒名、产区、品种…" oninput="renderWines()">
    <select id="filterLiked" onchange="renderWines()">
      <option value="">全部</option>
      <option value="是 ✓">喜欢 ✓</option>
      <option value="否 ✗">不喜欢 ✗</option>
      <option value="还好">还好</option>
    </select>
    <select id="filterColor" onchange="renderWines()">
      <option value="">全部颜色</option>
      <option value="白葡萄酒">白葡萄酒</option>
      <option value="红葡萄酒">红葡萄酒</option>
      <option value="气泡酒">气泡酒</option>
      <option value="甜品酒">甜品酒</option>
      <option value="桃红">桃红</option>
    </select>
    <button class="btn btn-primary" onclick="openAddModal()">＋ 添加</button>
    <button class="btn btn-secondary" onclick="toggleIO()">导入 / 导出</button>
  </div>

  <div class="io-panel" id="ioPanel">
    <h3>数据管理 · Data Management</h3>
    <div class="io-actions">
      <button class="btn btn-gold" onclick="exportJSON()">⬇ 下载 JSON（备份到GitHub）</button>
      <label class="btn btn-secondary" style="cursor:pointer; display:inline-flex; align-items:center;">
        ⬆ 导入 JSON
        <input type="file" accept=".json" style="display:none" onchange="importJSON(event)">
      </label>
    </div>
    <p class="io-note">每次添加/修改后，下载JSON文件上传到GitHub仓库即可永久保存。</p>
  </div>

  <div class="wine-grid" id="wineGrid"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">添加新酒 · Add Wine</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>酒名 Wine Name *</label>
        <input type="text" id="fName" placeholder="e.g. Bread & Butter Chardonnay">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>产区 Appellation</label>
          <input type="text" id="fAppellation" placeholder="e.g. Mosel, Germany">
        </div>
        <div class="form-group">
          <label>年份 Vintage</label>
          <input type="text" id="fVintage" placeholder="e.g. 2022">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>葡萄品种 Grape</label>
          <input type="text" id="fGrape" placeholder="e.g. Chenin Blanc">
        </div>
        <div class="form-group">
          <label>类型 Type</label>
          <select class="form-select" id="fColor">
            <option value="">选择…</option>
            <option value="白葡萄酒">白葡萄酒 White</option>
            <option value="红葡萄酒">红葡萄酒 Red</option>
            <option value="气泡酒">气泡酒 Sparkling</option>
            <option value="桃红">桃红 Rosé</option>
            <option value="甜品酒">甜品酒 Sweet</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>评分 Rating</label>
          <div class="rating-input" id="starInput">
            <button class="star-btn" data-v="1" onclick="setRating(1)">★</button>
            <button class="star-btn" data-v="2" onclick="setRating(2)">★</button>
            <button class="star-btn" data-v="3" onclick="setRating(3)">★</button>
            <button class="star-btn" data-v="4" onclick="setRating(4)">★</button>
            <button class="star-btn" data-v="5" onclick="setRating(5)">★</button>
          </div>
        </div>
        <div class="form-group">
          <label>喜欢？ Liked?</label>
          <select class="form-select" id="fLiked">
            <option value="是 ✓">是 ✓ Yes</option>
            <option value="否 ✗">否 ✗ No</option>
            <option value="还好">还好 OK</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>香气 / 口感笔记 Tasting Notes</label>
        <textarea id="fNotes" placeholder="香气、口感、质地……"></textarea>
      </div>
      <div class="form-group">
        <label>场合 / 地点 Occasion</label>
        <input type="text" id="fOccasion" placeholder="e.g. 银海邮轮, 生日晚宴">
      </div>
      <div class="form-group">
        <label>酒标照片 Label Photo</label>
        <div class="photo-upload-area" id="uploadArea">
          <input type="file" accept="image/*" onchange="handlePhotoUpload(event)">
          <span class="upload-icon">📷</span>
          <span class="upload-text">点击或拖拽上传酒标照片</span>
          <img id="photoPreview" class="photo-preview" alt="preview">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveWine()">保存 Save</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">酒款详情 · Details</span>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="detailContent"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ────────────────────────────────────────────────────

let wines = [];
let editingId = null;
let currentRating = 0;
let currentPhoto = "";

function loadData() {
  const saved = localStorage.getItem('wineJournal');
  if (saved) {
    try { wines = JSON.parse(saved); }
    catch(e) { wines = [...INITIAL_WINES]; }
  } else {
    wines = [...INITIAL_WINES];
    saveData();
  }
}

function saveData() {
  localStorage.setItem('wineJournal', JSON.stringify(wines));
}

// ── RENDER ───────────────────────────────────────────────────
function renderWines() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fl = document.getElementById('filterLiked').value;
  const fc = document.getElementById('filterColor').value;

  let filtered = wines.filter(w => {
    const matchQ = !q || [w.name, w.appellation, w.grape, w.notes, w.occasion].some(s => s && s.toLowerCase().includes(q));
    const matchL = !fl || w.liked === fl;
    const matchC = !fc || w.color === fc;
    return matchQ && matchL && matchC;
  });

  const grid = document.getElementById('wineGrid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><span class="big">🍷</span>暂无记录，点击「添加」开始记录第一款酒</div>`;
  } else {
    grid.innerHTML = filtered.map((w,i) => cardHTML(w, i)).join('');
  }
  updateStats();
}

function cardHTML(w, i) {
  const stars = '★'.repeat(w.rating) + '☆'.repeat(5 - w.rating);
  const likedClass = w.liked === '是 ✓' ? 'liked-yes' : w.liked === '否 ✗' ? 'liked-no' : 'liked-ok';
  const photo = w.photo
    ? `<img class="card-photo" src="${w.photo}" alt="${w.name}" loading="lazy">`
    : `<div class="card-photo-placeholder">🍷</div>`;

  return `<div class="wine-card" style="animation-delay:${i*0.03}s" onclick="openDetail(${w.id})">
    ${photo}
    <div class="card-body">
      <span class="card-liked ${likedClass}">${w.liked}</span>
      <div class="card-name">${w.name}</div>
      <div class="card-meta">${[w.appellation, w.grape, w.vintage].filter(Boolean).join(' · ')}</div>
      <div class="card-rating">${stars}</div>
      ${w.notes ? `<div class="card-notes">${w.notes}</div>` : ''}
    </div>
    <div class="card-footer">
      <span class="card-occasion">${w.occasion || ''}</span>
      <div class="card-actions">
        <button class="btn-icon" title="编辑" onclick="event.stopPropagation(); openEdit(${w.id})">✏️</button>
        <button class="btn-icon" title="删除" onclick="event.stopPropagation(); deleteWine(${w.id})">🗑️</button>
      </div>
    </div>
  </div>`;
}

function updateStats() {
  document.getElementById('statTotal').textContent = wines.length;
  document.getElementById('statLiked').textContent = wines.filter(w => w.liked === '是 ✓').length;
  const countries = new Set(wines.map(w => (w.appellation || '').split(',').pop().trim()).filter(Boolean));
  document.getElementById('statCountries').textContent = countries.size;
}

// ── ADD / EDIT MODAL ─────────────────────────────────────────
function openAddModal() {
  editingId = null;
  currentRating = 0;
  currentPhoto = "";
  document.getElementById('modalTitle').textContent = '添加新酒 · Add Wine';
  ['fName','fAppellation','fGrape','fVintage','fNotes','fOccasion'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fColor').value = '';
  document.getElementById('fLiked').value = '是 ✓';
  document.getElementById('photoPreview').style.display = 'none';
  setRating(0);
  document.getElementById('addModal').classList.add('open');
}

function openEdit(id) {
  const w = wines.find(x => x.id === id);
  if (!w) return;
  editingId = id;
  currentPhoto = w.photo || "";
  document.getElementById('modalTitle').textContent = '编辑 · Edit';
  document.getElementById('fName').value = w.name;
  document.getElementById('fAppellation').value = w.appellation || '';
  document.getElementById('fGrape').value = w.grape || '';
  document.getElementById('fVintage').value = w.vintage || '';
  document.getElementById('fColor').value = w.color || '';
  document.getElementById('fLiked').value = w.liked || '是 ✓';
  document.getElementById('fNotes').value = w.notes || '';
  document.getElementById('fOccasion').value = w.occasion || '';
  const prev = document.getElementById('photoPreview');
  if (w.photo) { prev.src = w.photo; prev.style.display = 'block'; }
  else { prev.style.display = 'none'; }
  setRating(w.rating || 0);
  document.getElementById('addModal').classList.add('open');
}

function closeModal() {
  document.getElementById('addModal').classList.remove('open');
}

function setRating(val) {
  currentRating = val;
  document.querySelectorAll('.star-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.v) <= val);
  });
}

function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentPhoto = ev.target.result;
    const prev = document.getElementById('photoPreview');
    prev.src = currentPhoto;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function saveWine() {
  const name = document.getElementById('fName').value.trim();
  if (!name) { showToast('请输入酒名'); return; }
  const wine = {
    id: editingId || Date.now(),
    name,
    appellation: document.getElementById('fAppellation').value.trim(),
    grape: document.getElementById('fGrape').value.trim(),
    vintage: document.getElementById('fVintage').value.trim(),
    color: document.getElementById('fColor').value,
    rating: currentRating,
    liked: document.getElementById('fLiked').value,
    notes: document.getElementById('fNotes').value.trim(),
    occasion: document.getElementById('fOccasion').value.trim(),
    photo: currentPhoto,
  };
  if (editingId) {
    const idx = wines.findIndex(w => w.id === editingId);
    wines[idx] = wine;
  } else {
    wines.push(wine);
  }
  saveData();
  renderWines();
  closeModal();
  showToast(editingId ? '已更新 ✓' : '已添加 ✓');
}

function deleteWine(id) {
  if (!confirm('确定删除这款酒的记录？')) return;
  wines = wines.filter(w => w.id !== id);
  saveData();
  renderWines();
  showToast('已删除');
}

// ── DETAIL MODAL ─────────────────────────────────────────────
function openDetail(id) {
  const w = wines.find(x => x.id === id);
  if (!w) return;
  const stars = '★'.repeat(w.rating) + '☆'.repeat(5 - w.rating);
  const photo = w.photo
    ? `<img class="detail-photo" src="${w.photo}" alt="${w.name}">`
    : `<div class="detail-photo-placeholder">🍷</div>`;
  document.getElementById('detailContent').innerHTML = `
    ${photo}
    <div class="detail-body">
      <div class="detail-name">${w.name}</div>
      <div class="detail-appellation">${[w.appellation, w.grape].filter(Boolean).join(' · ')}</div>
      <div class="detail-grid">
        <div class="detail-field"><label>年份 Vintage</label><div class="value">${w.vintage || '—'}</div></div>
        <div class="detail-field"><label>类型 Type</label><div class="value">${w.color || '—'}</div></div>
        <div class="detail-field"><label>评分 Rating</label><div class="value" style="color:var(--gold)">${stars}</div></div>
        <div class="detail-field"><label>喜欢？</label><div class="value">${w.liked || '—'}</div></div>
        ${w.occasion ? `<div class="detail-field" style="grid-column:1/-1"><label>场合 Occasion</label><div class="value">${w.occasion}</div></div>` : ''}
      </div>
      ${w.notes ? `<div class="detail-divider"></div><div class="detail-notes-label">品鉴笔记 Tasting Notes</div><div class="detail-notes">${w.notes}</div>` : ''}
    </div>`;
  document.getElementById('detailFooter').innerHTML = `
    <button class="btn btn-secondary" onclick="closeDetail()">关闭</button>
    <button class="btn btn-primary" onclick="closeDetail(); openEdit(${w.id})">编辑 ✏️</button>`;
  document.getElementById('detailModal').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
}

// ── IMPORT / EXPORT ──────────────────────────────────────────
function toggleIO() {
  document.getElementById('ioPanel').classList.toggle('open');
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(wines, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'wine-journal.json';
  a.click();
  showToast('已下载 JSON 文件 ✓');
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data)) {
        wines = data;
        saveData();
        renderWines();
        showToast(`已导入 ${data.length} 款酒 ✓`);
      }
    } catch(err) { showToast('文件格式有误'); }
  };
  reader.readAsText(file);
}

// ── TOAST ────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── CLOSE ON OVERLAY CLICK ───────────────────────────────────
document.getElementById('addModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('detailModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });

// ── INIT ─────────────────────────────────────────────────────
loadData();
renderWines();
</script>
