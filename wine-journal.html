<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wine Journal · 我的酒单</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --burgundy: #5C1E2C;
    --burgundy-deep: #3D1019;
    --burgundy-light: #8B3A4A;
    --gold: #C9A84C;
    --gold-light: #E8CC7A;
    --gold-pale: #F5EDD6;
    --cream: #FAF6EF;
    --cream-dark: #F0E8D8;
    --ink: #1C1008;
    --ink-mid: #5C4033;
    --ink-light: #9A7A6A;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--cream); color: var(--ink); font-family: 'Crimson Pro', Georgia, serif; font-size: 16px; line-height: 1.6; min-height: 100vh; }

  header { background: var(--burgundy-deep); padding: 28px 24px 20px; text-align: center; position: relative; overflow: hidden; }
  header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 50% 120%, rgba(201,168,76,0.15) 0%, transparent 70%); }
  header .ornament { color: var(--gold); font-size: 11px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.7; margin-bottom: 6px; }
  header h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(24px, 5vw, 38px); font-weight: 300; color: var(--cream); letter-spacing: 2px; }
  header h1 span { color: var(--gold); }
  header .subtitle { font-family: 'Crimson Pro', serif; font-style: italic; color: var(--gold-light); opacity: 0.8; font-size: 13px; margin-top: 4px; letter-spacing: 1px; }
  .header-line { width: 50px; height: 1px; background: var(--gold); margin: 14px auto 0; opacity: 0.5; }

  .stats-bar { background: var(--burgundy); display: flex; justify-content: center; border-bottom: 1px solid rgba(201,168,76,0.2); }
  .stat { padding: 9px 24px; text-align: center; border-right: 1px solid rgba(201,168,76,0.15); flex: 1; max-width: 140px; }
  .stat:last-child { border-right: none; }
  .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--gold); display: block; line-height: 1; }
  .stat-label { font-size: 10px; color: rgba(245,237,214,0.6); text-transform: uppercase; letter-spacing: 1.5px; }

  .toolbar { background: var(--cream-dark); padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; border-bottom: 1px solid rgba(92,30,44,0.1); position: sticky; top: 0; z-index: 10; }
  .toolbar input[type="text"] { flex: 1; min-width: 160px; padding: 7px 12px; border: 1px solid rgba(92,30,44,0.2); border-radius: 2px; background: var(--white); font-family: 'Crimson Pro', serif; font-size: 14px; color: var(--ink); outline: none; }
  .toolbar input[type="text"]:focus { border-color: var(--burgundy-light); }
  .toolbar select { padding: 7px 10px; border: 1px solid rgba(92,30,44,0.2); border-radius: 2px; background: var(--white); font-family: 'Crimson Pro', serif; font-size: 14px; color: var(--ink); outline: none; cursor: pointer; }
  .btn { padding: 7px 16px; border: none; border-radius: 2px; font-family: 'Crimson Pro', serif; font-size: 14px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; white-space: nowrap; }
  .btn-primary { background: var(--burgundy); color: var(--gold-pale); }
  .btn-primary:hover { background: var(--burgundy-light); }
  .btn-secondary { background: transparent; color: var(--burgundy); border: 1px solid var(--burgundy); }
  .btn-secondary:hover { background: rgba(92,30,44,0.08); }
  .btn-gold { background: var(--gold); color: var(--burgundy-deep); font-weight: 600; }
  .btn-gold:hover { background: var(--gold-light); }

  .container { padding: 16px 20px; max-width: 960px; margin: 0 auto; }
  .wine-list { display: flex; flex-direction: column; gap: 1px; }

  .wine-row { background: var(--white); display: grid; grid-template-columns: 72px 1fr auto; align-items: stretch; border: 1px solid rgba(92,30,44,0.08); border-radius: 2px; overflow: hidden; cursor: pointer; transition: box-shadow 0.2s, border-color 0.2s; animation: fadeIn 0.25s ease both; }
  .wine-row:hover { border-color: rgba(92,30,44,0.25); box-shadow: 0 3px 16px rgba(92,30,44,0.08); z-index: 1; position: relative; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-6px); } to { opacity: 1; transform: translateX(0); } }

  .row-photo { width: 72px; min-height: 72px; object-fit: cover; display: block; }
  .row-photo-placeholder { width: 72px; min-height: 72px; background: linear-gradient(135deg, var(--burgundy-deep), var(--burgundy)); display: flex; align-items: center; justify-content: center; font-size: 24px; color: rgba(201,168,76,0.25); flex-shrink: 0; }

  .row-body { padding: 10px 14px; display: flex; flex-direction: column; justify-content: center; gap: 2px; min-width: 0; }
  .row-top { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .row-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; color: var(--ink); line-height: 1.2; }
  .row-vintage { font-size: 12px; color: var(--ink-light); }
  .row-meta { font-size: 12px; color: var(--ink-light); font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-notes { font-size: 13px; color: var(--ink-mid); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-bottom { display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap; }
  .row-rating { color: var(--gold); font-size: 11px; letter-spacing: 1px; }
  .tag { display: inline-block; font-size: 10px; padding: 1px 7px; border-radius: 1px; letter-spacing: 0.3px; }
  .tag-yes { background: rgba(92,30,44,0.08); color: var(--burgundy); }
  .tag-no { background: rgba(0,0,0,0.05); color: var(--ink-light); }
  .tag-ok { background: rgba(201,168,76,0.12); color: var(--ink-mid); }
  .tag-type { background: rgba(201,168,76,0.1); color: var(--ink-mid); }
  .row-location { font-size: 11px; color: var(--ink-light); font-style: italic; }
  .row-date { font-size: 11px; color: var(--ink-light); }

  .row-actions { display: flex; flex-direction: column; border-left: 1px solid rgba(92,30,44,0.06); background: var(--cream); }
  .btn-icon { background: none; border: none; cursor: pointer; flex: 1; font-size: 14px; opacity: 0.4; transition: opacity 0.2s, background 0.2s; padding: 0 12px; min-width: 40px; }
  .btn-icon:hover { opacity: 1; background: rgba(92,30,44,0.06); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--ink-light); font-style: italic; }
  .empty-state .big { font-size: 44px; display: block; margin-bottom: 12px; opacity: 0.3; }

  .io-panel { background: var(--cream-dark); border: 1px solid rgba(92,30,44,0.1); border-radius: 2px; padding: 14px 18px; margin-bottom: 16px; display: none; }
  .io-panel.open { display: block; }
  .io-panel h3 { font-family: 'Cormorant Garamond', serif; font-size: 15px; color: var(--burgundy); margin-bottom: 10px; font-weight: 400; }
  .io-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .io-note { font-size: 11px; color: var(--ink-light); font-style: italic; margin-top: 8px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(28,16,8,0.7); z-index: 100; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(2px); }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--cream); width: 100%; max-width: 560px; max-height: 92vh; overflow-y: auto; border-radius: 3px; box-shadow: 0 24px 80px rgba(28,16,8,0.4); animation: modalIn 0.2s ease; }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.97) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal-header { background: var(--burgundy-deep); padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1; }
  .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 19px; color: var(--gold-pale); font-weight: 300; letter-spacing: 1px; }
  .modal-close { background: none; border: none; color: var(--gold); font-size: 20px; cursor: pointer; opacity: 0.7; transition: opacity 0.2s; line-height: 1; padding: 4px; }
  .modal-close:hover { opacity: 1; }
  .modal-body { padding: 20px 22px; }

  .form-group { margin-bottom: 14px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-light); margin-bottom: 4px; }
  input[type="text"], input[type="date"], textarea, select.form-select { width: 100%; padding: 8px 11px; border: 1px solid rgba(92,30,44,0.2); border-radius: 2px; background: var(--white); font-family: 'Crimson Pro', serif; font-size: 15px; color: var(--ink); outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus, input[type="date"]:focus, textarea:focus, select.form-select:focus { border-color: var(--burgundy-light); }
  textarea { resize: vertical; min-height: 68px; }

  .rating-input { display: flex; gap: 4px; }
  .star-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #ddd; transition: color 0.15s, transform 0.15s; padding: 2px; line-height: 1; }
  .star-btn.active { color: var(--gold); }
  .star-btn:hover { transform: scale(1.2); }

  .photo-upload-area { border: 2px dashed rgba(92,30,44,0.2); border-radius: 3px; padding: 16px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; }
  .photo-upload-area:hover { border-color: var(--burgundy-light); background: rgba(92,30,44,0.03); }
  .photo-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .photo-preview { width: 100%; max-height: 160px; object-fit: cover; border-radius: 2px; margin-top: 8px; display: none; }
  .upload-text { font-size: 12px; color: var(--ink-light); font-style: italic; }
  .upload-icon { font-size: 24px; opacity: 0.3; display: block; margin-bottom: 4px; }

  .modal-footer { padding: 14px 22px; background: var(--cream-dark); border-top: 1px solid rgba(92,30,44,0.08); display: flex; gap: 10px; justify-content: flex-end; position: sticky; bottom: 0; }

  .detail-photo { width: 100%; max-height: 220px; object-fit: cover; display: block; }
  .detail-photo-placeholder { width: 100%; height: 140px; background: linear-gradient(135deg, var(--burgundy-deep), var(--burgundy)); display: flex; align-items: center; justify-content: center; font-size: 50px; color: rgba(201,168,76,0.2); }
  .detail-body { padding: 18px 22px; }
  .detail-name { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 400; color: var(--ink); margin-bottom: 3px; line-height: 1.2; }
  .detail-sub { font-style: italic; color: var(--ink-light); font-size: 13px; margin-bottom: 12px; }
  .detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
  .detail-field label { margin-bottom: 2px; }
  .detail-field .value { font-size: 15px; color: var(--ink); }
  .detail-divider { height: 1px; background: rgba(92,30,44,0.1); margin: 12px 0; }
  .detail-notes-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-light); margin-bottom: 5px; }
  .detail-notes { font-size: 15px; color: var(--ink-mid); line-height: 1.7; font-style: italic; }

  .toast { position: fixed; bottom: 20px; right: 20px; background: var(--burgundy-deep); color: var(--gold-pale); padding: 9px 18px; border-radius: 2px; font-size: 13px; border-left: 3px solid var(--gold); opacity: 0; transform: translateY(6px); transition: all 0.3s; z-index: 200; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: rgba(92,30,44,0.25); border-radius: 3px; }

  @media (max-width: 500px) {
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr 1fr; }
    .wine-row { grid-template-columns: 56px 1fr auto; }
    .row-photo, .row-photo-placeholder { width: 56px; }
  }
</style>
</head>
<body>

<header>
  <div class="ornament">✦ Wine Journal ✦</div>
  <h1>My <span>Wine</span> Journal</h1>
  <p class="subtitle">A personal record of wines tasted · 我的品鉴记录</p>
  <div class="header-line"></div>
</header>

<div class="stats-bar">
  <div class="stat"><span class="stat-num" id="statTotal">0</span><span class="stat-label">Recorded</span></div>
  <div class="stat"><span class="stat-num" id="statLiked">0</span><span class="stat-label">Loved ♥</span></div>
  <div class="stat"><span class="stat-num" id="statCountries">0</span><span class="stat-label">Countries</span></div>
</div>

<div class="container">
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍  Search by name, region, grape…" oninput="renderWines()">
    <select id="filterLiked" onchange="renderWines()">
      <option value="">All</option>
      <option value="♥ Yes">♥ Loved</option>
      <option value="✗ No">✗ Disliked</option>
      <option value="~ OK">~ OK</option>
    </select>
    <select id="filterColor" onchange="renderWines()">
      <option value="">All types</option>
      <option value="White">White</option>
      <option value="Red">Red</option>
      <option value="Sparkling">Sparkling</option>
      <option value="Rosé">Rosé</option>
      <option value="Sweet">Sweet</option>
    </select>
    <button class="btn btn-primary" onclick="openAddModal()">＋ Add Wine</button>
    <button class="btn btn-secondary" onclick="toggleIO()">Import / Export</button>
  </div>

  <div class="io-panel" id="ioPanel">
    <h3>Data Management</h3>
    <div class="io-actions">
      <button class="btn btn-gold" onclick="exportJSON()">⬇ Download JSON (backup to GitHub)</button>
      <label class="btn btn-secondary" style="cursor:pointer;display:inline-flex;align-items:center;">
        ⬆ Import JSON
        <input type="file" accept=".json" style="display:none" onchange="importJSON(event)">
      </label>
    </div>
    <p class="io-note">After adding new wines, download the JSON and upload it to your GitHub repository to save permanently.</p>
  </div>

  <div class="wine-list" id="wineList"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add Wine</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Wine Name *</label>
        <input type="text" id="fName" placeholder="e.g. Bread & Butter Chardonnay">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Appellation / Region</label>
          <input type="text" id="fAppellation" placeholder="e.g. Mosel, Germany">
        </div>
        <div class="form-group">
          <label>Grape Variety</label>
          <input type="text" id="fGrape" placeholder="e.g. Chenin Blanc">
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label>Vintage</label>
          <input type="text" id="fVintage" placeholder="e.g. 2022">
        </div>
        <div class="form-group">
          <label>Type</label>
          <select class="form-select" id="fColor">
            <option value="">Select…</option>
            <option value="White">White</option>
            <option value="Red">Red</option>
            <option value="Sparkling">Sparkling</option>
            <option value="Rosé">Rosé</option>
            <option value="Sweet">Sweet</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date Tasted</label>
          <input type="date" id="fDate">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="fLocation" placeholder="e.g. London, Nobu">
        </div>
        <div class="form-group">
          <label>Occasion</label>
          <input type="text" id="fOccasion" placeholder="e.g. Birthday dinner">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Rating</label>
          <div class="rating-input">
            <button class="star-btn" data-v="1" onclick="setRating(1)">★</button>
            <button class="star-btn" data-v="2" onclick="setRating(2)">★</button>
            <button class="star-btn" data-v="3" onclick="setRating(3)">★</button>
            <button class="star-btn" data-v="4" onclick="setRating(4)">★</button>
            <button class="star-btn" data-v="5" onclick="setRating(5)">★</button>
          </div>
        </div>
        <div class="form-group">
          <label>Liked?</label>
          <select class="form-select" id="fLiked">
            <option value="♥ Yes">♥ Yes — Loved it</option>
            <option value="✗ No">✗ No — Didn't like</option>
            <option value="~ OK">~ OK — Fine</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Tasting Notes</label>
        <textarea id="fNotes" placeholder="Aromas, texture, finish…"></textarea>
      </div>
      <div class="form-group">
        <label>Label Photo</label>
        <div class="photo-upload-area">
          <input type="file" accept="image/*" onchange="handlePhotoUpload(event)">
          <span class="upload-icon">📷</span>
          <span class="upload-text">Click or drag to upload a label photo</span>
          <img id="photoPreview" class="photo-preview" alt="preview">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveWine()">Save</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Wine Details</span>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div id="detailContent"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

  {id:23, name:"Bernhard Ott Ried Stein", appellation:"Kamptal, Austria", grape:"Grüner Veltliner", vintage:"2019", color:"White", rating:5, liked:"♥ Yes", notes:"很喜欢，丰腴矿物，高品质", location:"", occasion:"", date:"", photo:""},
];

let wines = [], editingId = null, currentRating = 0, currentPhoto = "";

function loadData() {
  const saved = localStorage.getItem('wineJournalV2');
  if (saved) { try { wines = JSON.parse(saved); } catch(e) { wines = [...INITIAL_WINES]; } }
  else { wines = [...INITIAL_WINES]; saveData(); }
}
function saveData() { localStorage.setItem('wineJournalV2', JSON.stringify(wines)); }

function renderWines() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fl = document.getElementById('filterLiked').value;
  const fc = document.getElementById('filterColor').value;
  let filtered = wines.filter(w => {
    const matchQ = !q || [w.name,w.appellation,w.grape,w.notes,w.location,w.occasion].some(s=>s&&s.toLowerCase().includes(q));
    return matchQ && (!fl||w.liked===fl) && (!fc||w.color===fc);
  });
  const list = document.getElementById('wineList');
  if (!filtered.length) {
    list.innerHTML = '<div class="empty-state"><span class="big">🍷</span>No wines yet — click "Add Wine" to start</div>';
  } else {
    list.innerHTML = filtered.map((w,i) => rowHTML(w,i)).join('');
  }
  updateStats();
}

function rowHTML(w, i) {
  const stars = '★'.repeat(w.rating)+'☆'.repeat(5-w.rating);
  const likedClass = w.liked==='♥ Yes'?'tag-yes':w.liked==='✗ No'?'tag-no':'tag-ok';
  const photo = w.photo
    ? `<img class="row-photo" src="${w.photo}" alt="" loading="lazy">`
    : `<div class="row-photo-placeholder">🍷</div>`;
  const meta = [w.appellation,w.grape].filter(Boolean).join(' · ');
  const bottom = [
    w.rating?`<span class="row-rating">${stars}</span>`:'',
    w.liked?`<span class="tag ${likedClass}">${w.liked}</span>`:'',
    w.color?`<span class="tag tag-type">${w.color}</span>`:'',
    w.date?`<span class="row-date">${w.date}</span>`:'',
    w.location?`<span class="row-location">📍 ${w.location}</span>`:'',
    w.occasion?`<span class="row-location">· ${w.occasion}</span>`:'',
  ].filter(Boolean).join('');
  return `<div class="wine-row" style="animation-delay:${i*0.02}s" onclick="openDetail(${w.id})">
    ${photo}
    <div class="row-body">
      <div class="row-top"><span class="row-name">${w.name}</span>${w.vintage?`<span class="row-vintage">${w.vintage}</span>`:''}</div>
      ${meta?`<div class="row-meta">${meta}</div>`:''}
      ${w.notes?`<div class="row-notes">${w.notes}</div>`:''}
      <div class="row-bottom">${bottom}</div>
    </div>
    <div class="row-actions">
      <button class="btn-icon" title="Edit" onclick="event.stopPropagation();openEdit(${w.id})">✏️</button>
      <button class="btn-icon" title="Delete" onclick="event.stopPropagation();deleteWine(${w.id})">🗑️</button>
    </div>
  </div>`;
}

function updateStats() {
  document.getElementById('statTotal').textContent = wines.length;
  document.getElementById('statLiked').textContent = wines.filter(w=>w.liked==='♥ Yes').length;
  const countries = new Set(wines.map(w=>(w.appellation||'').split(',').pop().trim()).filter(Boolean));
  document.getElementById('statCountries').textContent = countries.size;
}

function openAddModal() {
  editingId=null; currentRating=0; currentPhoto="";
  document.getElementById('modalTitle').textContent='Add Wine';
  ['fName','fAppellation','fGrape','fVintage','fNotes','fOccasion','fLocation','fDate'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fColor').value='';
  document.getElementById('fLiked').value='♥ Yes';
  document.getElementById('photoPreview').style.display='none';
  setRating(0);
  document.getElementById('addModal').classList.add('open');
}

function openEdit(id) {
  const w = wines.find(x=>x.id===id); if(!w) return;
  editingId=id; currentPhoto=w.photo||"";
  document.getElementById('modalTitle').textContent='Edit Wine';
  document.getElementById('fName').value=w.name;
  document.getElementById('fAppellation').value=w.appellation||'';
  document.getElementById('fGrape').value=w.grape||'';
  document.getElementById('fVintage').value=w.vintage||'';
  document.getElementById('fColor').value=w.color||'';
  document.getElementById('fLiked').value=w.liked||'♥ Yes';
  document.getElementById('fNotes').value=w.notes||'';
  document.getElementById('fOccasion').value=w.occasion||'';
  document.getElementById('fLocation').value=w.location||'';
  document.getElementById('fDate').value=w.date||'';
  const prev=document.getElementById('photoPreview');
  if(w.photo){prev.src=w.photo;prev.style.display='block';}else{prev.style.display='none';}
  setRating(w.rating||0);
  document.getElementById('addModal').classList.add('open');
}

function closeModal() { document.getElementById('addModal').classList.remove('open'); }
function setRating(val) { currentRating=val; document.querySelectorAll('.star-btn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.v)<=val)); }

function handlePhotoUpload(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{currentPhoto=ev.target.result;const p=document.getElementById('photoPreview');p.src=currentPhoto;p.style.display='block';};
  reader.readAsDataURL(file);
}

function saveWine() {
  const name=document.getElementById('fName').value.trim();
  if(!name){showToast('Please enter a wine name');return;}
  const wine={id:editingId||Date.now(),name,appellation:document.getElementById('fAppellation').value.trim(),grape:document.getElementById('fGrape').value.trim(),vintage:document.getElementById('fVintage').value.trim(),color:document.getElementById('fColor').value,rating:currentRating,liked:document.getElementById('fLiked').value,notes:document.getElementById('fNotes').value.trim(),location:document.getElementById('fLocation').value.trim(),occasion:document.getElementById('fOccasion').value.trim(),date:document.getElementById('fDate').value,photo:currentPhoto};
  if(editingId){wines[wines.findIndex(w=>w.id===editingId)]=wine;}else{wines.push(wine);}
  saveData();renderWines();closeModal();showToast(editingId?'Updated ✓':'Added ✓');
}

function deleteWine(id) {
  if(!confirm('Delete this wine record?')) return;
  wines=wines.filter(w=>w.id!==id);saveData();renderWines();showToast('Deleted');
}

function openDetail(id) {
  const w=wines.find(x=>x.id===id); if(!w) return;
  const stars='★'.repeat(w.rating)+'☆'.repeat(5-w.rating);
  const photo=w.photo?`<img class="detail-photo" src="${w.photo}" alt="">`:`<div class="detail-photo-placeholder">🍷</div>`;
  document.getElementById('detailContent').innerHTML=`${photo}<div class="detail-body"><div class="detail-name">${w.name}</div><div class="detail-sub">${[w.appellation,w.grape].filter(Boolean).join(' · ')}</div><div class="detail-grid"><div class="detail-field"><label>Vintage</label><div class="value">${w.vintage||'—'}</div></div><div class="detail-field"><label>Type</label><div class="value">${w.color||'—'}</div></div><div class="detail-field"><label>Rating</label><div class="value" style="color:var(--gold)">${stars}</div></div><div class="detail-field"><label>Liked?</label><div class="value">${w.liked||'—'}</div></div>${w.date?`<div class="detail-field"><label>Date</label><div class="value">${w.date}</div></div>`:''} ${w.location?`<div class="detail-field"><label>Location</label><div class="value">${w.location}</div></div>`:''} ${w.occasion?`<div class="detail-field"><label>Occasion</label><div class="value">${w.occasion}</div></div>`:''}</div>${w.notes?`<div class="detail-divider"></div><div class="detail-notes-label">Tasting Notes</div><div class="detail-notes">${w.notes}</div>`:''}</div>`;
  document.getElementById('detailFooter').innerHTML=`<button class="btn btn-secondary" onclick="closeDetail()">Close</button><button class="btn btn-primary" onclick="closeDetail();openEdit(${w.id})">Edit ✏️</button>`;
  document.getElementById('detailModal').classList.add('open');
}

function closeDetail() { document.getElementById('detailModal').classList.remove('open'); }
function toggleIO() { document.getElementById('ioPanel').classList.toggle('open'); }

function exportJSON() {
  const blob=new Blob([JSON.stringify(wines,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wine-journal.json';a.click();
  showToast('JSON downloaded ✓');
}

function importJSON(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(Array.isArray(data)){wines=data;saveData();renderWines();showToast(`Imported ${data.length} wines ✓`);}}catch(err){showToast('Invalid file format');}};
  reader.readAsText(file);
}

function showToast(msg) {
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

document.getElementById('addModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('detailModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeDetail();});

loadData();
renderWines();
</script>
</body>
</html>
