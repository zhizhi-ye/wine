<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wine Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF6EF;color:#1C1008;font-family:'Crimson Pro',Georgia,serif;font-size:18px;line-height:1.6;min-height:100vh}
:root{--burg:#5C1E2C;--burg-deep:#3D1019;--burg-light:#8B3A4A;--gold:#C9A84C;--gold-l:#E8CC7A;--gold-pale:#F5EDD6;--cream:#FAF6EF;--cream-d:#F0E8D8;--ink:#1C1008;--ink-m:#5C4033;--ink-l:#9A7A6A;--white:#FFFFFF}

/* HEADER */
header{background:var(--burg-deep);padding:24px 24px 18px;text-align:center;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 120%,rgba(201,168,76,.15) 0%,transparent 70%)}
.ornament{color:var(--gold);font-size:12px;letter-spacing:4px;text-transform:uppercase;opacity:.7;margin-bottom:5px}
header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(22px,5vw,36px);font-weight:300;color:var(--cream);letter-spacing:2px}
header h1 span{color:var(--gold)}
.subtitle{font-style:italic;color:var(--gold-l);opacity:.8;font-size:15px;margin-top:3px;letter-spacing:1px}
.hline{width:40px;height:1px;background:var(--gold);margin:12px auto 0;opacity:.5}

/* STATS */
.stats-bar{background:var(--burg);display:flex;justify-content:center;border-bottom:1px solid rgba(201,168,76,.2)}
.stat{padding:8px 20px;text-align:center;border-right:1px solid rgba(201,168,76,.15);flex:1;max-width:130px}
.stat:last-child{border-right:none}
.stat-num{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);display:block;line-height:1}
.stat-label{font-size:12px;color:rgba(245,237,214,.6);text-transform:uppercase;letter-spacing:1.5px}

/* TOOLBAR */
.toolbar{background:var(--cream-d);padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid rgba(92,30,44,.1);position:sticky;top:0;z-index:10;justify-content:flex-end}
.btn{padding:7px 14px;border:none;border-radius:2px;font-family:'Crimson Pro',serif;font-size:16px;cursor:pointer;transition:all .2s;letter-spacing:.5px;white-space:nowrap}
.btn-primary{background:var(--burg);color:var(--gold-pale)}
.btn-primary:hover{background:var(--burg-light)}
.btn-secondary{background:transparent;color:var(--burg);border:1px solid var(--burg)}
.btn-secondary:hover{background:rgba(92,30,44,.08)}
.btn-gold{background:var(--gold);color:var(--burg-deep);font-weight:600}
.btn-gold:hover{background:var(--gold-l)}
.btn-sm{padding:5px 10px;font-size:12px}

/* TYPE FILTER TABS */
.type-tabs{background:var(--cream);padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid rgba(92,30,44,.08)}
.type-tab{font-family:'Crimson Pro',serif;font-size:14px;padding:5px 14px;border-radius:20px;border:1px solid rgba(92,30,44,.2);background:transparent;color:var(--ink-m);cursor:pointer;transition:all .2s;white-space:nowrap}
.type-tab:hover{border-color:var(--burg);color:var(--burg)}
.type-tab.active{background:var(--burg);color:var(--gold-pale);border-color:var(--burg)}

/* IO PANEL */
.io-panel{background:var(--cream-d);border:1px solid rgba(92,30,44,.1);border-radius:2px;padding:12px 16px;margin-bottom:14px;display:none}
.io-panel.open{display:block}
.io-panel h3{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--burg);margin-bottom:8px;font-weight:400}
.io-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.io-note{font-size:13px;color:var(--ink-l);font-style:italic;margin-top:6px}

/* MASONRY GRID */
.container{padding:16px;max-width:1100px;margin:0 auto}
.masonry{columns:2;column-gap:12px}
@media(min-width:600px){.masonry{columns:3}}
@media(min-width:900px){.masonry{columns:4}}
@media(min-width:1100px){.masonry{columns:5}}

/* POLAROID CARD */
.pcard{break-inside:avoid;margin-bottom:12px;cursor:pointer;display:inline-block;width:100%;transition:transform .2s;animation:fadeUp .3s ease both}
.pcard:hover{transform:translateY(-3px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.polaroid-frame{padding:6px 6px 0 6px;box-shadow:0 4px 20px rgba(0,0,0,.22),0 1px 6px rgba(0,0,0,.12)}
.bg-white{background:#4A6741}
.bg-red{background:#5C1E2C}
.bg-pink{background:#C4607A}
.bg-orange{background:#A85A20}
.bg-gold{background:#B8962A}
.bg-purple{background:#2C4A6E}
.photo-box{width:100%;aspect-ratio:3/4;overflow:hidden;position:relative}
.photo-box.landscape{aspect-ratio:4/3}
.photo-box img{width:100%;height:100%;object-fit:cover;display:block}
.photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:34px;color:rgba(201,168,76,.25)}
.pcard-bottom{padding:6px 6px 10px}
.pcard-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:#fff;line-height:1.3;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 1px 3px rgba(0,0,0,.3)}
.pcard-meta{display:flex;align-items:center;justify-content:space-between;gap:4px}
.pcard-grape{font-size:14px;color:rgba(255,255,255,.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}
.liked-tag{font-size:14px;padding:2px 7px;border-radius:2px;flex-shrink:0;white-space:nowrap}
.liked-yes{background:rgba(255,255,255,.2);color:#fff}
.liked-no{background:rgba(0,0,0,.2);color:rgba(255,255,255,.7)}
.liked-ok{background:rgba(255,255,255,.2);color:#fff}

/* EMPTY */
.empty-state{text-align:center;padding:50px 20px;color:var(--ink-l);font-style:italic;column-span:all}
.empty-state .big{font-size:42px;display:block;margin-bottom:10px;opacity:.3}

/* MODAL OVERLAY */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(28,16,8,.75);z-index:100;align-items:center;justify-content:center;padding:12px;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}

/* ADD/EDIT MODAL */
.modal{background:var(--cream);width:100%;max-width:540px;max-height:92vh;overflow-y:auto;border-radius:3px;box-shadow:0 24px 80px rgba(28,16,8,.4);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{background:var(--burg-deep);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold-pale);font-weight:300;letter-spacing:1px}
.modal-close{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;opacity:.7;transition:opacity .2s;line-height:1;padding:4px}
.modal-close:hover{opacity:1}
.modal-body{padding:18px 20px}
.form-group{margin-bottom:12px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-l);margin-bottom:3px}
input[type=text],input[type=date],input[type=number],textarea,select.fs{width:100%;padding:7px 10px;border:1px solid rgba(92,30,44,.2);border-radius:2px;background:var(--white);font-family:'Crimson Pro',serif;font-size:16px;color:var(--ink);outline:none;transition:border-color .2s}
input[type=text]:focus,input[type=date]:focus,input[type=number]:focus,textarea:focus,select.fs:focus{border-color:var(--burg-light)}
textarea{resize:vertical;min-height:60px}
.photo-upload-area{border:2px dashed rgba(92,30,44,.2);border-radius:3px;padding:14px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative}
.photo-upload-area:hover{border-color:var(--burg-light);background:rgba(92,30,44,.02)}
.photo-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-preview{width:100%;max-height:140px;object-fit:cover;border-radius:2px;margin-top:6px;display:none}
.upload-text{font-size:13px;color:var(--ink-l);font-style:italic}
.upload-icon{font-size:24px;opacity:.3;display:block;margin-bottom:3px}
.modal-footer{padding:12px 20px;background:var(--cream-d);border-top:1px solid rgba(92,30,44,.08);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0}

/* TASTE SLIDER */
.taste-slider-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.taste-lbl{font-size:12px;color:var(--ink-l);width:48px;text-align:right;flex-shrink:0}
.taste-lbl-r{font-size:12px;color:var(--ink-l);width:48px;flex-shrink:0}
input[type=range].taste-range{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:#e0d8ce;outline:none;cursor:pointer}
input[type=range].taste-range::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--burg);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* DETAIL MODAL */
.dmodal{background:var(--cream);width:100%;max-width:660px;max-height:94vh;overflow-y:auto;border-radius:3px;box-shadow:0 24px 80px rgba(28,16,8,.4);animation:modalIn .2s ease}
.detail-top{display:grid;grid-template-columns:200px 1fr;align-items:stretch}
@media(max-width:480px){.detail-top{grid-template-columns:1fr}}
.detail-photo-col{position:relative;min-height:280px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.detail-photo-col img{width:100%;object-fit:contain;display:block;position:relative;z-index:1}
.detail-photo-ph{width:100%;height:100%;min-height:280px;display:flex;align-items:center;justify-content:center;font-size:58px;color:rgba(201,168,76,.2)}
.detail-type-badge{position:absolute;top:10px;left:10px;background:rgba(201,168,76,.92);color:var(--burg-deep);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:2px}
.detail-info{padding:16px 18px;display:flex;flex-direction:column;gap:8px}
.d-wine-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--ink);line-height:1.2}
.d-wine-sub{font-size:16px;color:var(--ink-l);font-style:italic}
.d-tags{display:flex;gap:5px;flex-wrap:wrap}
.d-tag{font-size:12px;padding:2px 7px;border-radius:2px;background:rgba(92,30,44,.07);color:var(--burg)}

/* specs row */
.specs-row{display:flex;border-top:1px solid rgba(92,30,44,.08);border-bottom:1px solid rgba(92,30,44,.08)}
.spec-item{flex:1;text-align:center;padding:8px 4px;border-right:1px solid rgba(92,30,44,.08)}
.spec-item:last-child{border-right:none}
.spec-val{font-size:18px;font-weight:600;color:var(--ink);display:block;line-height:1.2}
.spec-lbl{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-l)}

/* when where */
.when-where{padding:12px 18px;border-bottom:1px solid rgba(92,30,44,.07)}
.ww-row{display:flex;gap:14px;flex-wrap:wrap}
.ww-item{display:flex;align-items:center;gap:5px}
.ww-icon{font-size:14px}
.ww-text{font-size:14px;color:var(--ink-l)}

/* rating liked row */
.rl-row{display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1px solid rgba(92,30,44,.07);flex-wrap:wrap}
.donut-block{display:flex;align-items:center;gap:7px}
.donut-lbl{font-size:12px;color:var(--ink-l);text-transform:uppercase;letter-spacing:1px}
.liked-block{display:flex;align-items:center;gap:5px}
.liked-pill{font-size:13px;padding:3px 10px;border-radius:2px;background:rgba(92,30,44,.08);color:var(--burg)}

/* taste section */
.d-section{padding:12px 18px;border-top:1px solid rgba(92,30,44,.07)}
.d-section-title{font-size:14px;text-transform:uppercase;letter-spacing:1.5px;color:var(--ink-l);margin-bottom:10px}
.d-taste-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.d-taste-l{font-size:14px;color:var(--ink-l);width:48px;text-align:right;flex-shrink:0}
.d-taste-r{font-size:14px;color:var(--ink-l);width:48px;flex-shrink:0}
.d-bar-track{flex:1;height:4px;background:#e8e0d4;border-radius:2px;position:relative}
.d-bar-dot{width:12px;height:12px;border-radius:50%;background:var(--burg);position:absolute;top:-4px;transform:translateX(-50%);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15)}

/* aroma cards */
.aroma-row{display:flex;gap:8px}
.aroma-card{flex:1;border-radius:6px;overflow:hidden;border:1px solid rgba(92,30,44,.08)}
.aroma-top{height:56px;display:flex;align-items:center;justify-content:center;font-size:22px}
.aroma-bot{padding:5px 7px;background:#fff}
.aroma-name{font-size:12px;font-weight:600;color:var(--ink)}
.aroma-sub{font-size:11px;color:var(--ink-l)}

/* tasting notes */
.notes-text{font-size:18px;color:var(--ink-m);font-style:italic;line-height:1.7}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--cream)}
::-webkit-scrollbar-thumb{background:rgba(92,30,44,.25);border-radius:3px}
@media(max-width:480px){.form-row,.form-row-3{grid-template-columns:1fr}.detail-top{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <div class="ornament">✦ Wine Journal ✦</div>
  <h1>ZhiZhi's <span>Wine</span> Journal</h1>
  <p class="subtitle">Record of wines tasted </p>
  <div class="hline"></div>
</header>

<div class="stats-bar">
  <div class="stat" onclick="toggleTypeTabs()" style="cursor:pointer;user-select:none" title="Filter by type"><span class="stat-num" id="statTotal">0</span><span class="stat-label">Recorded</span></div>
  <div class="stat" onclick="toggleLikedTabs()" style="cursor:pointer;user-select:none" title="Filter by preference"><span class="stat-num" id="statLiked">0</span><span class="stat-label">Loved ♥</span></div>
  <div class="stat" onclick="toggleCountryTabs()" style="cursor:pointer;user-select:none" title="Filter by country"><span class="stat-num" id="statCountries">0</span><span class="stat-label">Countries</span></div>
  <div class="stat" onclick="toggleGrapeTabs()" style="cursor:pointer;user-select:none" title="Filter by grape"><span class="stat-num" id="statGrapes">0</span><span class="stat-label">Grapes</span></div>
  <div class="stat" style="padding:6px 16px;display:flex;align-items:center;gap:8px;max-width:none;flex:0">
    <button class="btn btn-primary" style="padding:6px 16px;font-size:14px" onclick="openAddModal()">＋ Add Wine</button>
    <button class="btn btn-secondary" style="padding:6px 10px;font-size:16px;border:none;background:none;color:var(--gold)" onclick="toggleIO()" title="Backup">⬇</button>
  </div>
</div>

<div class="type-tabs" id="typeTabs" style="display:none">
  <button class="type-tab active" onclick="filterType('')">All</button>
  <button class="type-tab" onclick="filterType('White')">⚪ White</button>
  <button class="type-tab" onclick="filterType('Red')">🔴 Red</button>
  <button class="type-tab" onclick="filterType('Sparkling')">🫧 Sparkling</button>
  <button class="type-tab" onclick="filterType('Rosé')">🩷 Rosé</button>
  <button class="type-tab" onclick="filterType('Orange')">🟠 Orange</button>
  <button class="type-tab" onclick="filterType('Sweet')">🍯 Sweet</button>
</div>

<div class="type-tabs" id="likedTabs" style="background:var(--cream-d);padding:8px 16px;gap:6px;border-top:none;display:none">
  <button class="type-tab active" onclick="filterLikedTab('')">All</button>
  <button class="type-tab" onclick="filterLikedTab('♥ Yes')">♥ Loved</button>
  <button class="type-tab" onclick="filterLikedTab('~ OK')">~ Fine</button>
  <button class="type-tab" onclick="filterLikedTab('✗ No')">✗ No</button>
</div>

<div class="type-tabs" id="grapeTabs" style="background:var(--cream);padding:8px 16px;gap:6px;display:none">
  <button class="type-tab active" onclick="filterGrapeTab('')">🍇 All</button>
</div>

<div class="type-tabs" id="countryTabs" style="background:var(--cream-d);padding:8px 16px;gap:6px;display:none">
  <button class="type-tab active" onclick="filterCountryTab('')">🌍 All</button>
</div>

<div class="container">
  <div class="io-panel" id="ioPanel">
    <h3>Data Management</h3>
    <div class="io-actions">
      <button class="btn btn-gold" onclick="exportJSON()">⬇ Download JSON</button>
      <label class="btn btn-secondary" style="cursor:pointer;display:inline-flex;align-items:center;">⬆ Import JSON<input type="file" accept=".json" style="display:none" onchange="importJSON(event)"></label>
    </div>
    <p class="io-note">Download JSON after adding wines → upload to GitHub to save permanently.</p>
  </div>

  <div class="masonry" id="wineGrid"></div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Add Wine</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Wine Name *</label>
        <input type="text" id="fName" placeholder="e.g. Bread & Butter Chardonnay">
      </div>
      <div class="form-row">
        <div class="form-group"><label>Appellation / Region</label><input type="text" id="fAppellation" placeholder="e.g. Mosel, Germany"></div>
        <div class="form-group"><label>Grape Variety</label><input type="text" id="fGrape" placeholder="e.g. Chenin Blanc"></div>
      </div>
      <div class="form-row-3">
        <div class="form-group"><label>Vintage</label><input type="text" id="fVintage" placeholder="2022"></div>
        <div class="form-group"><label>Type</label>
          <select class="fs" id="fColor">
            <option value="">Select…</option>
            <option value="White">White</option>
            <option value="Red">Red</option>
            <option value="Sparkling">Sparkling</option>
            <option value="Rosé">Rosé</option>
            <option value="Orange">Orange</option>
            <option value="Sweet">Sweet</option>
          </select>
        </div>
        <div class="form-group"><label>Alcohol %</label><input type="number" id="fAlcohol" placeholder="13.5" step="0.1" min="0" max="22"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date Tasted</label><input type="date" id="fDate"></div>
        <div class="form-group"><label>Price (£)</label><input type="text" id="fPrice" placeholder="e.g. 18.99"></div>
        <div class="form-group"><label>Liked?</label>
          <select class="fs" id="fLiked">
            <option value="♥ Yes">♥ Yes — Loved it</option>
            <option value="✗ No">✗ No — Didn't like</option>
            <option value="~ OK">~ OK — Fine</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Location / Venue</label><input type="text" id="fLocation" placeholder="e.g. Nobu, London"></div>
        <div class="form-group"><label>City</label><input type="text" id="fCity" placeholder="e.g. London"></div>
      </div>
      <div class="form-group"><label>Occasion</label><input type="text" id="fOccasion" placeholder="e.g. Birthday dinner"></div>

      <div class="form-group" style="margin-top:14px">
        <label style="margin-bottom:8px">Rating (0–5)</label>
        <div class="taste-slider-row"><span class="taste-lbl" style="width:30px;text-align:left;font-size:12px;font-weight:600;color:var(--burg)" id="ratingVal">0</span><input type="range" class="taste-range" id="fRating" min="0" max="5" step="1" value="0" oninput="document.getElementById('ratingVal').textContent=this.value" style="flex:1"></div>
      </div>

      <div class="form-group">
        <label style="margin-bottom:8px">Taste Profile</label>
        <div class="taste-slider-row"><span class="taste-lbl">Light</span><input type="range" class="taste-range" id="tBody" min="0" max="100" value="50"><span class="taste-lbl-r">Bold</span></div>
        <div class="taste-slider-row"><span class="taste-lbl">Smooth</span><input type="range" class="taste-range" id="tTannin" min="0" max="100" value="50"><span class="taste-lbl-r">Tannic</span></div>
        <div class="taste-slider-row"><span class="taste-lbl">Dry</span><input type="range" class="taste-range" id="tSweet" min="0" max="100" value="50"><span class="taste-lbl-r">Sweet</span></div>
        <div class="taste-slider-row"><span class="taste-lbl">Soft</span><input type="range" class="taste-range" id="tAcid" min="0" max="100" value="50"><span class="taste-lbl-r">Acidic</span></div>
      </div>

      <div class="form-group">
        <label>Aroma Notes (comma-separated)</label>
        <input type="text" id="fAroma" placeholder="e.g. Peach, honey, citrus, mineral">
      </div>
      <div class="form-group"><label>Tasting Notes</label><textarea id="fNotes" placeholder="Aromas, texture, finish…"></textarea></div>
      <div class="form-group"><label>Buy Link (URL)</label><input type="text" id="fUrl" placeholder="e.g. https://www.majestic.co.uk/..."></div>
      <div class="form-group">
        <label>Label Photo</label>
        <div class="photo-upload-area">

// ── BG COLOR BY TYPE ──
function bgClass(color){
  const m={White:'bg-white',Red:'bg-red',Rosé:'bg-pink',Rose:'bg-pink',Orange:'bg-orange',Sweet:'bg-gold',Sparkling:'bg-purple'};
  return m[color]||'bg-white';
}
function bgColor(color){
  const m={White:'#4A6741',Red:'#4a1520',Rosé:'#C4607A',Rose:'#C4607A',Orange:'#A85A20',Sweet:'#B8962A',Sparkling:'#2C4A6E'};
  return m[color]||'#4A6741';
}
function likedLabel(rating){
  if(rating<=1) return'✗ No';
  if(rating===2) return'~ Maybe';
  if(rating===3) return'· Fine';
  if(rating>=4) return'♥ Love it!';
  return'—';
}
function likedClass(rating){
  if(rating<=1) return'liked-no';
  if(rating<=3) return'liked-ok';
  return'liked-yes';
}
function aromatBg(i){return['#6B3A2A','#3D2B1F','#4A3728','#2A4A3A','#5A3A20'][i%5]}

// ── HEART RATING ──
function heartRating(rating,size){
  const filled=rating||0;
  const s=size||14;
  const hearts=Array.from({length:5},(_,i)=>{
    const on=i<filled;
    return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" style="display:inline-block;vertical-align:middle"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="'+(on?'#fff':'none')+'" stroke="'+(on?'#fff':'rgba(255,255,255,0.4)')+'" stroke-width="2"/></svg>';
  }).join('');
  return '<span style="display:inline-flex;gap:1px;align-items:center">'+hearts+'</span>';
}

let wines=[],editingId=null,currentPhoto="",activeType="",activeLiked="",activeGrape="",activeCountry="";

function toggleTypeTabs(){
  const el=document.getElementById('typeTabs');
  const isOpen=el.style.display==='flex';
  el.style.display=isOpen?'none':'flex';
  if(isOpen){activeType='';document.querySelectorAll('#typeTabs .type-tab').forEach(t=>t.classList.toggle('active',t.textContent.trim()==='All'));renderWines();}
}
function toggleLikedTabs(){
  const el=document.getElementById('likedTabs');
  const isOpen=el.style.display==='flex';
  el.style.display=isOpen?'none':'flex';
  if(isOpen){activeLiked='';document.querySelectorAll('#likedTabs .type-tab').forEach(t=>t.classList.toggle('active',t.textContent.trim()==='All'));renderWines();}
}
function toggleCountryTabs(){
  const el=document.getElementById('countryTabs');
  const isOpen=el.style.display==='flex';
  el.style.display=isOpen?'none':'flex';
  if(isOpen){activeCountry='';renderWines();}
}
function toggleGrapeTabs(){
  const gt=document.getElementById('grapeTabs');
  const isOpen=gt.style.display!=='none'&&gt.style.display!=='';
  gt.style.display=isOpen?'none':'flex';
  if(isOpen){activeGrape='';renderWines();}
}
function filterCountryTab(val){
  activeCountry=val;
  document.querySelectorAll('#countryTabs .type-tab').forEach(t=>{
    const oc=t.getAttribute('onclick');
    t.classList.toggle('active',oc===`filterCountryTab('${val}')`||(val===''&&t.textContent.includes('All')));
  });
  renderWines();
}
function filterGrapeTab(val){
  activeGrape=val;
  document.querySelectorAll('#grapeTabs .type-tab').forEach(t=>{
    const oc=t.getAttribute('onclick');
    t.classList.toggle('active',oc===`filterGrapeTab('${val}')`||(val===''&&t.textContent.trim()==='🍇 All'));
  });
  renderWines();
}
function filterLikedTab(val){
  activeLiked=val;
  document.querySelectorAll('#likedTabs .type-tab').forEach(t=>{
    const oc=t.getAttribute('onclick');
    t.classList.toggle('active',oc===`filterLikedTab('${val}')`||(val===''&&t.textContent.trim()==='All'));
  });
  renderWines();
}
function filterType(type){
  activeType=type;
  document.querySelectorAll('.type-tab').forEach(t=>{
    t.classList.toggle('active', t.getAttribute('onclick')===`filterType('${type}')`|| (type===''&&t.textContent.trim()==='All'));
  });
  renderWines();
}

function loadData(){
  const s=localStorage.getItem('wineJournalV3');
  if(s){try{wines=JSON.parse(s);}catch(e){wines=[...WINES];}}
  else{wines=[...WINES];saveData();}
}
function saveData(){localStorage.setItem('wineJournalV3',JSON.stringify(wines));}

// ── RENDER GRID ──
function renderWines(){
  const grapeVal=activeGrape||'';
  let f=wines.filter(w=>{
    const matchC=!activeType||w.color===activeType;
    const matchL=!activeLiked||w.liked===activeLiked;
    const matchG=!grapeVal||w.grape===grapeVal;
    const matchCo=!activeCountry||(w.appellation||"").toLowerCase().includes(activeCountry.toLowerCase());
    return matchC&&matchL&&matchG&&matchCo;
  });
  const g=document.getElementById('wineGrid');
  if(!f.length){g.innerHTML='<div class="empty-state"><span class="big">🍷</span>No wines yet — click "+ Add Wine"</div>';updateStats();return;}
  g.innerHTML=f.map((w,i)=>cardHTML(w,i)).join('');
  updateStats();
}

function cardHTML(w,i){
  const bc=bgClass(w.color);
  const bg=bgColor(w.color);
  const isLandscape=w.photo&&w._landscape;
  const photoBox=w.photo
    ?`<div class="photo-box${isLandscape?' landscape':''}"><img src="${w.photo}" alt=""></div>`
    :`<div class="photo-box"><div class="photo-placeholder" style="background:${bg}">🍷</div></div>`;
  const lLabel=likedLabel(w.rating||0);
  const lClass=likedClass(w.rating||0);
  const donutStroke=w.rating>=4?'#FFD97A':w.rating<=1?'#aaa':'#C9A84C';
  return `<div class="pcard" style="animation-delay:${i*.03}s" onclick="openDetail(${w.id})">
    <div class="polaroid-frame ${bc}">
      ${photoBox}
      <div class="pcard-bottom">
        <div class="pcard-name">${w.name}</div>
        <div class="pcard-meta">
          <span class="pcard-grape">${w.grape||''}</span>
          <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">
            <span class="liked-tag ${lClass}">${lLabel}</span>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function updateStats(){
  document.getElementById('statTotal').textContent=wines.length;
  document.getElementById('statLiked').textContent=wines.filter(w=>w.liked==='♥ Yes').length;
  document.getElementById('statGrapes').textContent=new Set(wines.map(w=>w.grape).filter(Boolean)).size;
  // populate country tabs
  const countries=[...new Set(wines.map(w=>(w.appellation||'').split(',').pop().trim()).filter(Boolean))].sort();
  const ct=document.getElementById('countryTabs');
  if(ct){ct.innerHTML='<button class="type-tab'+(activeCountry===''?' active':'')+'" onclick="filterCountryTab(\'\')">🌍 All</button>'+countries.map(c=>`<button class="type-tab${activeCountry===c?' active':''}" onclick="filterCountryTab('${c}')">${countryFlag(c)} ${c}</button>`).join('');}
  // populate grape tabs
  const grapes=[...new Set(wines.map(w=>w.grape).filter(Boolean))].sort();
  const gt=document.getElementById('grapeTabs');
  if(gt){gt.innerHTML='<button class="type-tab'+(activeGrape===''?' active':'')+'" onclick="filterGrapeTab(\'\')">🍇 All</button>'+grapes.map(g=>`<button class="type-tab${activeGrape===g?' active':''}" onclick="filterGrapeTab('${g}')">${g}</button>`).join('');}
  const c=new Set(wines.map(w=>(w.appellation||'').split(',').pop().trim()).filter(Boolean));
  document.getElementById('statCountries').textContent=c.size;
}

// ── ADD/EDIT ──
function openAddModal(){
  editingId=null;currentPhoto="";
  document.getElementById('modalTitle').textContent='Add Wine';
  ['fName','fAppellation','fGrape','fVintage','fNotes','fLocation','fCity','fOccasion','fDate','fAroma','fUrl','fPrice'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fColor').value='';
  document.getElementById('fLiked').value='♥ Yes';
  document.getElementById('fRating').value=0;document.getElementById('ratingVal').textContent='0';
  document.getElementById('fAlcohol').value='';
  ['tBody','tTannin','tSweet','tAcid'].forEach(id=>document.getElementById(id).value=50);
  document.getElementById('photoPreview').style.display='none';
  document.getElementById('addModal').classList.add('open');
}

function openEdit(id){
  const w=wines.find(x=>x.id===id);if(!w)return;
  editingId=id;currentPhoto=w.photo||"";
  document.getElementById('modalTitle').textContent='Edit Wine';
  document.getElementById('fName').value=w.name;
  document.getElementById('fAppellation').value=w.appellation||'';
  document.getElementById('fGrape').value=w.grape||'';
  document.getElementById('fVintage').value=w.vintage||'';
  document.getElementById('fColor').value=w.color||'';
  document.getElementById('fLiked').value=w.liked||'♥ Yes';
  document.getElementById('fNotes').value=w.notes||'';
  document.getElementById('fLocation').value=w.location||'';
  document.getElementById('fCity').value=w.city||'';
  document.getElementById('fOccasion').value=w.occasion||'';
  document.getElementById('fDate').value=w.date||'';
  document.getElementById('fAroma').value=w.aroma||'';
  document.getElementById('fUrl').value=w.url||'';
  document.getElementById('fPrice').value=w.price||'';
  document.getElementById('fAlcohol').value=w.alcohol||'';
  document.getElementById('fRating').value=w.rating||0;document.getElementById('ratingVal').textContent=w.rating||0;
  document.getElementById('tBody').value=w.tBody||50;
  document.getElementById('tTannin').value=w.tTannin||50;
  document.getElementById('tSweet').value=w.tSweet||50;
  document.getElementById('tAcid').value=w.tAcid||50;
  const prev=document.getElementById('photoPreview');
  if(w.photo){prev.src=w.photo;prev.style.display='block';}else{prev.style.display='none';}
  document.getElementById('addModal').classList.add('open');
}

function closeModal(){document.getElementById('addModal').classList.remove('open');}

function handlePhoto(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    currentPhoto=ev.target.result;
    const img=new Image();
    img.onload=()=>{window._photoLandscape=img.width>img.height;};
    img.src=currentPhoto;
    const prev=document.getElementById('photoPreview');
    prev.src=currentPhoto;prev.style.display='block';
  };
  reader.readAsDataURL(file);
}

function saveWine(){
  const name=document.getElementById('fName').value.trim();
  if(!name){showToast('Please enter a wine name');return;}
  const wine={
    id:editingId||Date.now(),name,
    appellation:document.getElementById('fAppellation').value.trim(),
    grape:document.getElementById('fGrape').value.trim(),
    vintage:document.getElementById('fVintage').value.trim(),
    color:document.getElementById('fColor').value,
    alcohol:parseFloat(document.getElementById('fAlcohol').value)||null,
    rating:parseInt(document.getElementById('fRating').value)||0,
    liked:document.getElementById('fLiked').value,
    notes:document.getElementById('fNotes').value.trim(),
    location:document.getElementById('fLocation').value.trim(),
    city:document.getElementById('fCity').value.trim(),
    occasion:document.getElementById('fOccasion').value.trim(),
    date:document.getElementById('fDate').value,
    aroma:document.getElementById('fAroma').value.trim(),
    url:document.getElementById('fUrl').value.trim(),
    price:document.getElementById('fPrice').value.trim(),
    tBody:parseInt(document.getElementById('tBody').value),
    tTannin:parseInt(document.getElementById('tTannin').value),
    tSweet:parseInt(document.getElementById('tSweet').value),
    tAcid:parseInt(document.getElementById('tAcid').value),
    photo:currentPhoto,
    _landscape:window._photoLandscape||false,
  };
  if(editingId){wines[wines.findIndex(w=>w.id===editingId)]=wine;}else{wines.push(wine);}
  saveData();renderWines();closeModal();showToast(editingId?'Updated ✓':'Added ✓');
}

function deleteWine(id){
  if(!confirm('Delete this record?'))return;
  wines=wines.filter(w=>w.id!==id);saveData();renderWines();showToast('Deleted');
}

// ── DETAIL ──

// ── COUNTRY FLAG ──
function countryFlag(appellation){
  const a=(appellation||'').toLowerCase();
  if(a.includes('france')) return '🇫🇷';
  if(a.includes('germany')) return '🇩🇪';
  if(a.includes('italy')||a.includes('sicil')||a.includes('etna')) return '🇮🇹';
  if(a.includes('spain')) return '🇪🇸';
  if(a.includes('england')||a.includes('dorset')||a.includes('uk')) return '🇬🇧';
  if(a.includes('austria')) return '🇦🇹';
  if(a.includes('new zealand')) return '🇳🇿';
  if(a.includes('south africa')) return '🇿🇦';
  if(a.includes('australia')) return '🇦🇺';
  if(a.includes('usa')||a.includes('california')||a.includes('sonoma')||a.includes('oregon')) return '🇺🇸';
  if(a.includes('canada')||a.includes('niagara')) return '🇨🇦';
  if(a.includes('chile')) return '🇨🇱';
  if(a.includes('argentina')) return '🇦🇷';
  if(a.includes('portugal')) return '🇵🇹';
  if(a.includes('greece')) return '🇬🇷';
  if(a.includes('hungary')) return '🇭🇺';
  if(a.includes('georgia')) return '🇬🇪';
  if(a.includes('japan')) return '🇯🇵';
  if(a.includes('china')) return '🇨🇳';
  return '🍷';
}
function openDetail(id){
  const w=wines.find(x=>x.id===id);if(!w)return;
  const bg=bgColor(w.color);
  const photo=w.photo
    ?`<img src="${w.photo}" alt="" style="width:100%;object-fit:contain;display:block;position:relative;z-index:1">`
    :`<div class="detail-photo-ph">🍷</div>`;

  const aromas=(w.aroma||'').split(',').map(s=>s.trim()).filter(Boolean).slice(0,5);
  function aromaEmoji(a){
    const t=a.toLowerCase();
    if(/cherry|cherr/.test(t)) return'🍒';
    if(/strawberr|raspberry|rasperr/.test(t)) return'🍓';
    if(/peach|apricot/.test(t)) return'🍑';
    if(/lemon|citrus|lime|grapefruit/.test(t)) return'🍋';
    if(/apple/.test(t)) return'🍏';
    if(/pear/.test(t)) return'🍐';
    if(/plum|blackberr|blueberr/.test(t)) return'🫐';
    if(/mango|tropical|pineapple/.test(t)) return'🥭';
    if(/honey|beeswax/.test(t)) return'🍯';
    if(/cream|butter|brioche|toast/.test(t)) return'🧈';
    if(/vanilla|caramel/.test(t)) return'🍮';
    if(/rose|floral|flower|violet|lilac/.test(t)) return'🌸';
    if(/herb|grass|green|pepper/.test(t)) return'🌿';
    if(/mineral|chalk|slate|volcanic|stone/.test(t)) return'⛰️';
    if(/cedar|tobacco|oak|wood|smoke/.test(t)) return'🪵';
    if(/spice|clove|cinnamon|anise/.test(t)) return'✨';
    if(/walnut|hazelnut|almond|nut/.test(t)) return'🌰';
    if(/dried|oxidative|quince/.test(t)) return'🫙';
    if(/coffee|chocolate|cocoa/.test(t)) return'☕';
    return'🍷';
  }
  const aromaCards=aromas.map((a,i)=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(92,30,44,.06)"><span style="font-size:18px;width:22px;text-align:center">${aromaEmoji(a)}</span><span style="font-size:14px;color:var(--ink-m)">${a}</span></div>`).join('');

  function bar(lbl,rbl,val){
    return `<div class="d-taste-row"><span class="d-taste-l">${lbl}</span><div class="d-bar-track"><div class="d-bar-dot" style="left:${val}%"></div></div><span class="d-taste-r">${rbl}</span></div>`;
  }

  const likedTxt=likedLabel(w.rating||0);
  document.getElementById('detailHeader').style.background=bgColor(w.color);
  document.getElementById('detailContent').innerHTML=`
    <div class="detail-top">
      <div class="detail-photo-col" style="background:${bg}">
        <div class="detail-type-badge">${w.color||'Wine'}</div>
        ${photo}
      </div>
      <div class="detail-info">
        <div class="d-wine-name">${w.name}</div>
        <div class="d-wine-sub">${countryFlag(w.appellation)} ${w.appellation||""}${w.grape?" · 🍇 "+w.grape:""}<span style="font-size:15px;color:var(--burg);margin-left:8px;font-style:normal;font-weight:600">${likedTxt}</span><span style="font-size:15px;color:var(--ink-m);margin-left:8px;font-style:normal">${w.price?'£'+w.price:'£—'}</span></div>
        <div class="specs-row">
          <div class="spec-item"><span class="spec-val">${w.vintage||'—'}</span><span class="spec-lbl">Vintage</span></div>
          <div class="spec-item"><span class="spec-val">${w.color||'—'}</span><span class="spec-lbl">Type</span></div>
          <div class="spec-item"><span class="spec-val">${w.alcohol?w.alcohol+'%':'—'}</span><span class="spec-lbl">Alcohol</span></div>
        </div>
        <div style="padding:10px 0 4px">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-l);width:52px;flex-shrink:0;font-size:14px">Rating</span>
            <div style="flex:1;height:4px;background:#e8e0d4;border-radius:2px;position:relative">
              <div style="position:absolute;top:-4px;left:${(w.rating||0)/5*100}%;transform:translateX(-50%);width:12px;height:12px;border-radius:50%;background:var(--burg);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15)"></div>
            </div>
            <span style="font-size:16px;font-weight:600;color:var(--burg);width:20px;text-align:right">${w.rating||0}</span>
          </div>
          ${aromas.length?`<div style="margin-top:8px;padding-top:6px;border-top:1px solid rgba(92,30,44,.07);display:flex;flex-wrap:wrap;gap:5px">${aromas.map(a=>`<span style="display:inline-flex;align-items:center;gap:4px;background:var(--cream-d);border:1px solid rgba(92,30,44,.12);border-radius:20px;padding:4px 12px;font-size:15px;color:var(--ink-m)">${aromaEmoji(a)} ${a}</span>`).join('')}</div>`:''}
        </div>
        <div class="specs-row" style="flex-wrap:wrap">
          <div class="spec-item" style="min-width:80px"><span class="spec-val" style="font-size:16px">${w.date||'—'}</span><span class="spec-lbl">Date</span></div>
          <div class="spec-item" style="min-width:80px"><span class="spec-val" style="font-size:16px">${w.location||'—'}</span><span class="spec-lbl">Venue</span></div>
          <div class="spec-item" style="min-width:80px"><span class="spec-val" style="font-size:16px">${w.city||'—'}</span><span class="spec-lbl">City</span></div>
        </div>
      </div>
    </div>

    <div class="d-section">
      <div class="d-section-title">Taste Profile</div>
      ${bar('Light','Bold',w.tBody||50)}
      ${bar('Smooth','Tannic',w.tTannin||50)}
      ${bar('Dry','Sweet',w.tSweet||50)}
      ${bar('Soft','Acidic',w.tAcid||50)}
    </div>

    ${w.notes?`<div class="d-section">
      <div class="d-section-title">Tasting Notes</div>
      <div class="notes-text">${w.notes}</div>
    </div>`:''}

    <div class="d-section">
      <div class="d-section-title">Where to Buy</div>
      ${w.url?`<a href="${w.url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;font-size:16px;color:var(--burg);text-decoration:none;padding:8px 14px;border:1px solid rgba(92,30,44,.2);border-radius:3px;transition:background .2s" onmouseover="this.style.background='rgba(92,30,44,.06)'" onmouseout="this.style.background=''">🛒 <span style="text-decoration:underline;text-underline-offset:2px">${w.url.replace(/^https?:\/\//,'').split('/')[0]}</span> <span style="font-size:13px;color:var(--ink-l);margin-left:2px">→</span></a>`:'<span style="font-size:15px;color:var(--ink-l);font-style:italic">No link added yet</span>'}
    </div>
  `;

  document.getElementById('detailFooter').innerHTML=`
    <button class="btn btn-secondary" onclick="closeDetail()">Close</button>
    <button class="btn btn-secondary" onclick="closeDetail();deleteWine(${w.id})" style="color:#c0392b;border-color:#c0392b">Delete</button>
    <button class="btn btn-primary" onclick="closeDetail();openEdit(${w.id})">Edit ✏️</button>`;
  document.getElementById('detailModal').classList.add('open');
}

function closeDetail(){document.getElementById('detailModal').classList.remove('open');}
function toggleIO(){document.getElementById('ioPanel').classList.toggle('open');}

function exportJSON(){
  const b=new Blob([JSON.stringify(wines,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='wine-journal.json';a.click();
  showToast('JSON downloaded ✓');
}

function importJSON(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d)){wines=d;saveData();renderWines();showToast(`Imported ${d.length} wines ✓`);}}catch(err){showToast('Invalid file');}};
  r.readAsText(file);
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';t.style.transform='translateY(0)';
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(6px)';},2200);
}

document.getElementById('addModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
document.getElementById('detailModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeDetail();});

loadData();renderWines();
</script>
